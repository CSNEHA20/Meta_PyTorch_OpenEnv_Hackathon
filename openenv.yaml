name: ambulance-dispatch-env
version: 1.0.0
description: |
  Production-grade reinforcement learning environment for city-scale ambulance
  dispatch optimisation. Agents manage a fleet of ambulances across a
  Barabási-Albert road network, routing to emergencies of three severity tiers
  (CRITICAL, HIGH, NORMAL) under dynamic rush-hour traffic, hospital capacity
  limits, and specialty routing constraints. Features a 9-component RFC 004
  Rubric for per-component training introspection and full RFC 001-005 compliance.
  Simulates India's 108/112 emergency dispatch system.
author: "Ambulance-OpenENV Team — CSNEHA20, Vishallakshmikanthan"
documentation_url: https://github.com/CSNEHA20/Meta_PyTorch_OpenEnv_Hackathon
huggingface_space: "https://huggingface.co/spaces/vishallakshmikanthan/Ambulance-OpenENV"
tags:
  - openenv
  - reinforcement-learning
  - ambulance-dispatch
  - multi-agent
  - emergency-services
  - pytorch
  - fastapi

inference_script: inference.py

action_space:
  type: object
  required: []
  additionalProperties: false
  properties:
    ambulance_id:
      type: ["integer", "null"]
      description: "ID of idle ambulance to dispatch (0-indexed)"
    emergency_id:
      type: string
      description: "UUID of the target unassigned emergency"
    hospital_id:
      type: ["integer", "null"]
      description: "ID of destination hospital (0-indexed)"
    reposition_node:
      type: ["integer", "null"]
      description: "Graph node to proactively reposition idle ambulance"
    is_noop:
      type: boolean
      default: false
      description: "Skip dispatch and advance simulation by one step"

observation_space:
  type: object
  properties:
    ambulances:
      type: array
      description: "Fleet status: node position, FSM state, ETA, assigned targets"
    emergencies:
      type: array
      description: "Active unassigned incidents: node, severity tier, time_remaining"
    hospitals:
      type: array
      description: "Hospital network: node, capacity, current_patients, specialty"
    traffic:
      type: object
      description: "Global traffic multiplier (1.0=normal, 2.5=rush hour)"
    step:
      type: integer
      description: "Current simulation timestep"
    reward:
      type: number
      description: "Scalar step reward computed by RFC 004 Rubric (9 components)"
    done:
      type: boolean
      description: "True when episode reaches max_steps"
    rubric:
      type: object
      description: >
        Per-component reward breakdown (RFC 004):
        emergency_served, severity_bonus, dispatch_speed, hospital_delivery,
        distance_penalty, traffic_penalty, idle_penalty, capacity_violation,
        timeout_penalty

tasks:
  - id: easy
    description: >
      Minimal setup — 2 ambulances, 2 hospitals, 30 steps, no traffic.
      Tests basic dispatch correctness and response time optimisation.
      Grader: mean(optimal_time/actual_response_time), clamped [0,1].
    difficulty: easy
    max_steps: 30
    config:
      n_ambulances: 2
      n_hospitals: 2
      max_steps: 30
      lambda_param: 0.3
      seed: 42
    grader: grader_easy.grade_easy
    baseline_score: 0.923

  - id: medium
    description: >
      4 ambulances, 3 hospitals, mild traffic (1.0–1.3x), 60 steps.
      Tests fleet coordination, priority dispatch, and hospital load balancing.
      Grader: 0.50*served_pct + 0.35*response_score - 0.15*idle_fraction.
    difficulty: medium
    max_steps: 60
    config:
      n_ambulances: 4
      n_hospitals: 3
      max_steps: 60
      lambda_param: 0.4
      seed: 42
    grader: grader_medium.grade_medium
    baseline_score: 0.176

  - id: hard
    description: >
      6 ambulances, 4 specialty hospitals (Trauma/Cardiac/General/Paediatric),
      dynamic rush-hour traffic (1.5–2.5x) + random incidents (3.0x), 100 steps.
      Tests CRITICAL-first triage, specialty routing, zone fairness, and
      hospital capacity management.
      Grader: 0.50*weighted_served + 0.30*priority_accuracy + 0.15*fairness - penalty.
    difficulty: hard
    max_steps: 100
    config:
      n_ambulances: 6
      n_hospitals: 4
      max_steps: 100
      lambda_param: 0.6
      seed: 42
    grader: grader_hard.grade_hard
    baseline_score: 0.658
rfc_compliance:
  - RFC-001  # Base Env API
  - RFC-002  # Auto-Discovery (/tools)
  - RFC-003  # MCP Protocol (/mcp)
  - RFC-004  # Named Rubric (9 components)
  - RFC-005  # Concurrent Sessions

